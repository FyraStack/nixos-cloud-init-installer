name: "Build Proxmox cloud image and create GitHub Release draft for new versions"

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the image filename (e.g. v1.0.0-test)"
        required: false
        default: "dev"
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v7
      - name: "Install Nix"
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:26.05
          extra_nix_config: |
            system-features = nixos-test benchmark big-parallel kvm uid-range
      - name: Determine version label
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Determine image package
        id: image-package
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "package=qcow2-compressed" >> "$GITHUB_OUTPUT"
          else
            echo "package=qcow2" >> "$GITHUB_OUTPUT"
          fi
      - name: Build QCOW2 image
        run: nix build .#${{ steps.image-package.outputs.package }}
      - name: Copy QCOW2 image
        run: |
          cp result/*.qcow2 nixos-cloud-proxmox-${{ steps.version.outputs.version }}-x86_64.qcow2
      - name: Check image size
        run: |
          ls -lh nixos-cloud-proxmox-${{ steps.version.outputs.version }}-x86_64.qcow2
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: qcow2-artifact-x86_64
          path: nixos-cloud-proxmox-${{ steps.version.outputs.version }}-x86_64.qcow2
  create-release:
    needs: build
    runs-on: ubuntu-latest
    # Only create a release on tag pushes, not manual runs
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: qcow2-artifacts
          pattern: qcow2-artifact-*
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: qcow2-artifacts/*.qcow2
