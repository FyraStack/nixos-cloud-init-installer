name: "Build images and create GitHub Release draft for new versions"

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v7
      - name: "Install Nix"
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:26.05
          extra_nix_config: |
            system-features = nixos-test benchmark big-parallel kvm uid-range
      - name: Build images
        run: >
          nix run github:nixos/nixpkgs/nixos-unstable#nixos-rebuild --
          build-image --image-variant qemu-efi --flake .#x86_64
      - name: Copy and compress qcow2 image
        run: |
          REAL_QCOW2_FILENAME=$(readlink -f $(find result/ -name "nixos-*.qcow2" -print -quit))
          # Compress with qemu-img — uses zlib, typically shrinks 50-70%
          qemu-img convert -O qcow2 -c "$REAL_QCOW2_FILENAME" \
            nixos-cloud-init-installer-${{ github.ref_name }}-x86_64.qcow2
      - name: Check compressed size
        run: |
          ls -lh nixos-cloud-init-installer-${{ github.ref_name }}-x86_64.qcow2
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: qcow2-artifact-x86_64
          path: nixos-cloud-init-installer-${{ github.ref_name }}-x86_64.qcow2
  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: qcow2-artifacts
          pattern: qcow2-artifact-*
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: qcow2-artifacts/*.qcow2
