name: "Build images and create GitHub Release draft for new versions"

on: # Only run on new version tag push
  push:
    tags:        
      - v*

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - architecture: x86_64
            os: ubuntu-24.04
          - architecture: aarch64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v7
      - name: "Install Nix"
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:26.05 # Change me on NixOS upgrades!
      - name: Build ISO images
        run: >
          nix run github:nixos/nixpkgs/nixos-unstable#nixos-rebuild -- \
          build-image --image-variant qemu-efi --flake .#${{ matrix.architecture }}
      - name: Copy and rename generated ISO file to reflect version and architecture
        run: |
          REAL_ISO_FILENAME=$(readlink -f $(find result/ -name "nixos-*.qcow2" -print -quit))
          cp "$REAL_ISO_FILENAME" \
            nixos-cloud-init-installer-${{ github.ref_name }}-${{ matrix.architecture }}.qcow2
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: qcow2-artifact-${{ matrix.architecture }}
          path: nixos-cloud-init-installer-${{ github.ref_name }}-${{ matrix.architecture }}.qcow2
  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: iso-artifacts
          pattern: iso-artifact-*
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: iso-artifacts/*.iso
